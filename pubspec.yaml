name: theme_palette_generator
description: "A code generator that automatically creates Flutter ThemeExtensions for custom design systems and color palettes."
version: 0.0.4
repository: https://github.com/Rerurate514/theme_palette_generator
homepage: https://rerurate.com
issue_tracker: https://github.com/Rerurate514/theme_palette_generator/issues

environment:
  sdk: ^3.11.3
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  analyzer: '>=7.0.0 <11.0.0'
  source_gen: ^4.2.3
  code_builder: ^4.11.1
  build: ^4.0.6
  dart_style: ^3.1.7
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  build_test: ^3.5.15
