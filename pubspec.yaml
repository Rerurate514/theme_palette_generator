name: theme_palette_generator
description: "A code generator that automatically creates Flutter ThemeExtensions for custom design systems and color palettes."
version: 0.0.1
homepage: https://github.com/Rerurate514/theme_palette_generator

environment:
  sdk: ^3.11.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  analyzer: any
  source_gen: any
  code_builder: any
  build: any
  dart_style: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  build_test: ^3.5.15
