name: theme_palette_generator
description: "A code generator that automatically creates Flutter ThemeExtensions for custom design systems and color palettes."
version: 0.0.1
homepage: https://github.com/Rerurate514/theme_palette_generator

environment:
  sdk: ^3.11.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  analyzer: ^10.0.1
  source_gen: ^4.2.3
  code_builder: ^4.11.1
  build: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  dart_style: ^3.1.7

builders:
  theme_palette_generator:
    import: "package:theme_palette_generator/builder.dart"
    builder_factories: ["themePaletteBuilder"]
    build_extensions: {".dart": [".theme.g.dart"]}
    auto_apply: dependents
    build_to: cache
    applies_builders: ["source_gen|combining_builder"]
